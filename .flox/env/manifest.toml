schema-version = "1.12.0"

[install]
python3.pkg-path = "python3"
python3.version = "^3.13.13"
go-task.pkg-path = "go-task"
go-task.version = "3.48.0"
black.pkg-path = "black"
black.version = "25.1.0"
isort.pkg-path = "isort"
isort.version = "7.0.0"
infer.flake = "github:inference-gateway/cli/v0.120.1"
claude-code.pkg-path = "claude-code"
claude-code.version = "^2.1.158"
claude-code.pkg-group = "claude-code"
codex.pkg-path = "codex"
codex.version = "^0.135.0"
codex.pkg-group = "codex"

[hook]
on-activate = """
  # Autogenerated by Flox

  # Setup a Python virtual environment

  export PYTHON_DIR="$FLOX_ENV_CACHE/python"
  if [ ! -d "$PYTHON_DIR" ]; then
    echo "Creating python virtual environment in $PYTHON_DIR"
    python -m venv "$PYTHON_DIR"
  fi

  # Activate the venv at the hook level so VIRTUAL_ENV/PATH propagate to
  # every subshell (including non-interactive ones spawned by `task`),
  # not just interactive shells covered by [profile].
  source "$PYTHON_DIR/bin/activate"

  # install the dependencies for this project based on pyproject.toml
  # <https://pip.pypa.io/en/stable/cli/pip_install/>
  pip install -e ".[dev]" --quiet

  # End autogenerated by Flox
"""

[profile]
bash = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate"

  # End autogenerated by Flox
"""
fish = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate.fish"

  # End autogenerated by Flox
"""
tcsh = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate.csh"

  # End autogenerated by Flox
"""
zsh = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate"

  # End autogenerated by Flox
"""
