---
name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  github_release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/create-github-app-token@v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Set up Git
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git config --global commit.gpgsign false
          git config --global commit.signoff true

      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "lts/*"

      - name: Install semantic release and plugins
        run: |
          mkdir -p "$RUNNER_TEMP/semantic-release"
          cat > "$RUNNER_TEMP/semantic-release/package.json" <<'EOF'
          {
            "private": true,
            "devDependencies": {
              "semantic-release": "25.0.5",
              "@semantic-release/commit-analyzer": "13.0.1",
              "@semantic-release/release-notes-generator": "14.1.1",
              "@semantic-release/changelog": "6.0.3",
              "@semantic-release/exec": "7.1.0",
              "@semantic-release/git": "10.0.1",
              "@semantic-release/github": "12.0.9",
              "conventional-changelog-conventionalcommits": "10.2.0"
            },
            "overrides": {
              "conventional-changelog-writer": "^9.1.0"
            }
          }
          EOF
          npm install --prefix "$RUNNER_TEMP/semantic-release"
          echo "$RUNNER_TEMP/semantic-release/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Create a release if needed
        id: semantic
        run: |
          dry_run_output=$(semantic-release --dry-run 2>&1 || true)

          # Check if there are no changes
          if $(echo "$dry_run_output" | grep -q "no new version is released"); then
            echo "No new release needed"
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract version from dry run output
          version=$(echo "$dry_run_output" | grep -oP "The next release version is \K[0-9]+\.[0-9]+\.[0-9]+")
          if [ -z "$version" ]; then
            echo "Error: Could not determine version"
            exit 1
          fi

          echo "new_release_version=$version" >> $GITHUB_OUTPUT

          # Run actual release
          if semantic-release; then
            echo "Release successful"
            echo "new_release_published=true" >> $GITHUB_OUTPUT
          else
            echo "Release failed"
            exit 1
          fi
        env:
          CI: true
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.app-token.outputs.app-slug }}[bot]
          GIT_AUTHOR_EMAIL: ${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ steps.app-token.outputs.app-slug }}[bot]
          GIT_COMMITTER_EMAIL: ${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com

  publish:
    needs: github_release
    runs-on: ubuntu-24.04
    if: needs.github_release.outputs.new_release_published == 'true'
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/inference-gateway
    steps:
      - name: Check out the code
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"

      - name: Update pyproject.toml version
        run: |
          echo "Updating to version ${{ needs.github_release.outputs.new_release_version }}"
          sed -i "s/^version = .*/version = \"${{ needs.github_release.outputs.new_release_version }}\"/" pyproject.toml

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install build --user

      - name: Build the package
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
